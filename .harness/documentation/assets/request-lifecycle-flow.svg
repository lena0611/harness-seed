  <text class="section" x="1335" y="732">커밋과 인계</text>
  <text class="small" x="1335" y="760">검증된 최종 후보를 기록 가능한 상태로 닫는다</text>

  <rect class="node-green" x="1345" y="805" width="350" height="72" rx="14" />
