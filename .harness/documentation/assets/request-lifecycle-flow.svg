  <rect x="1173" y="812" width="44" height="22" rx="11" fill="#0f766e" />
  <text class="badge-text" x="1183" y="828">Tool</text>

  <path class="arrow" d="M1102 877 V930" />
  <polygon class="diamond" points="1102,930 1195,978 1102,1026 1009,978" />
