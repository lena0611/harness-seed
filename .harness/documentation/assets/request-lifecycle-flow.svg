  <rect x="706" y="572" width="56" height="22" rx="11" fill="#2563eb" />
  <text class="badge-text" x="717" y="588">Token</text>

  <rect class="panel" x="830" y="250" width="395" height="375" rx="18" />
  <text class="section" x="860" y="292">초안 구현</text>
  <text class="small" x="860" y="320">기준과 영향 범위를 확인한 뒤 최소 변경으로 초안을 만든다</text>

  <rect class="node" x="870" y="356" width="315" height="58" rx="14" />
  <text class="label" x="900" y="391">관련 코드/문서 확인</text>
