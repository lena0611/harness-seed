  <rect class="panel" x="60" y="1110" width="1680" height="62" rx="16" />
  <text class="small" x="90" y="1148">읽는 데 토큰을 쓰는 구간은 판단, 기준 해석, 요약, 충돌 분류입니다. 로컬 명령, 파일 검사, 빌드, 테스트는 Tool/Repo 구간이며 토큰보다 실제 실행 결과가 기준이 됩니다.</text>
</svg>
