  <text class="small" x="1520" y="502">사용자 소유 변경으로 간주</text>
  <rect x="1648" y="459" width="44" height="22" rx="11" fill="#475569" />
  <text class="badge-text" x="1660" y="475">Repo</text>

  <path class="arrow" d="M1600 517 V555" />
  <rect class="node" x="1465" y="555" width="270" height="50" rx="14" />
