  <rect x="1126" y="456" width="56" height="22" rx="11" fill="#2563eb" />
  <text class="badge-text" x="1137" y="472">Token</text>

  <path class="arrow" d="M1027 506 V540" />
  <rect class="node" x="870" y="540" width="315" height="58" rx="14" />
