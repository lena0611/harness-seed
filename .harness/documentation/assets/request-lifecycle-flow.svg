  <rect x="1062" y="548" width="44" height="22" rx="11" fill="#0f766e" />
  <text class="badge-text" x="1072" y="564">Tool</text>
  <rect x="1112" y="548" width="44" height="22" rx="11" fill="#475569" />
  <text class="badge-text" x="1124" y="564">Repo</text>
  <rect x="1162" y="548" width="56" height="22" rx="11" fill="#2563eb" />
