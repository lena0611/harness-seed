<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1800 1220" preserveAspectRatio="xMidYMid meet" style="display:block;width:100%;height:100%;max-width:100%;max-height:100vh;" role="img" aria-labelledby="title desc">
  <title id="title">하네스 설치 프로젝트의 요구사항 라이프사이클</title>
  <desc id="desc">개발 요청 수신부터 코딩 전 사고 흐름, 초안 구현, 개발자 검토 루프, 직접 수정 반영, 최종화 검증, 커밋 확정까지의 전체 흐름</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .panel-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 18; }
      .panel-green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 18; }
      .panel-amber { fill: #fffbeb; stroke: #d97706; stroke-width: 2; rx: 18; }
      .panel-purple { fill: #faf5ff; stroke: #9333ea; stroke-width: 2; rx: 18; }
      .node { fill: #ffffff; stroke: #1d4ed8; stroke-width: 2; rx: 14; }
      .node-green { fill: #ffffff; stroke: #15803d; stroke-width: 2; rx: 14; }
      .node-amber { fill: #ffffff; stroke: #d97706; stroke-width: 2; rx: 14; }
      .node-red { fill: #ffffff; stroke: #dc2626; stroke-width: 2; rx: 14; }
      .diamond { fill: #ffffff; stroke: #d97706; stroke-width: 2; }
      .title { font: 800 42px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #475569; }
      .section { font: 800 24px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 15px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #334155; }
      .tiny { font: 700 13px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #334155; }
      .phase { font: 800 18px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #0f172a; }
      .badge-text { font: 800 12px "Apple SD Gothic Neo", "Noto Sans CJK KR", Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow-soft); }
      .arrow-red { stroke: #dc2626; stroke-width: 2.5; fill: none; marker-end: url(#arrow-red); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow-soft); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f172a" />
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b" />
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#dc2626" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1220" />

  <text class="title" x="60" y="70">하네스 설치 프로젝트: 요구사항 라이프사이클</text>
  <text class="subtitle" x="60" y="108">개발 요청 수신부터 초안, 재수정, 직접 수정 반영, 검증, 커밋 확정까지 이어지는 전체 흐름</text>

  <rect class="panel" x="1325" y="42" width="410" height="92" rx="18" />
  <text class="label" x="1350" y="75">범례</text>
  <rect x="1350" y="92" width="56" height="24" rx="12" fill="#2563eb" />
  <text class="badge-text" x="1361" y="109">Token</text>
  <rect x="1422" y="92" width="44" height="24" rx="12" fill="#0f766e" />
  <text class="badge-text" x="1432" y="109">Tool</text>
  <rect x="1482" y="92" width="54" height="24" rx="12" fill="#7c3aed" />
  <text class="badge-text" x="1493" y="109">Human</text>
  <rect x="1552" y="92" width="44" height="24" rx="12" fill="#475569" />
  <text class="badge-text" x="1564" y="109">Repo</text>
  <text class="tiny" x="1612" y="110">판단 / 명령 / 결정 / 파일</text>

  <g id="phases">
    <rect class="panel-green" x="60" y="158" width="240" height="58" rx="16" />
    <text class="phase" x="90" y="193">1. 요구사항 수신</text>
    <rect class="panel-blue" x="318" y="158" width="240" height="58" rx="16" />
    <text class="phase" x="348" y="193">2. 기준 탐색</text>
    <rect class="panel-amber" x="576" y="158" width="240" height="58" rx="16" />
    <text class="phase" x="606" y="193">3. 범위/충돌 판단</text>
    <rect class="panel-blue" x="834" y="158" width="240" height="58" rx="16" />
    <text class="phase" x="864" y="193">4. 초안 구현</text>
    <rect class="panel-purple" x="1092" y="158" width="240" height="58" rx="16" />
    <text class="phase" x="1122" y="193">5. 개발자 검토</text>
    <rect class="panel-amber" x="1350" y="158" width="240" height="58" rx="16" />
    <text class="phase" x="1380" y="193">6. 최종화 검증</text>
    <rect class="panel-green" x="1608" y="158" width="132" height="58" rx="16" />
    <text class="phase" x="1632" y="193">7. 확정</text>
  </g>

  <rect class="panel-blue" x="60" y="250" width="720" height="375" rx="18" />
  <text class="section" x="90" y="292">코딩 전 사고 흐름</text>
  <text class="small" x="90" y="320">요청 구현 전 확인: 기준, 우선순위, 영향 범위, 충돌 가능성을 먼저 살핀다</text>

  <rect class="node-green" x="90" y="355" width="170" height="72" rx="14" />
