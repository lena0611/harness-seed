name: Policy Guard

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  policy-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply active stack (scaffold + package.json merge)
        run: |
          active="$(node -pe "JSON.parse(require('fs').readFileSync('.harness/policy/profile.json','utf8')).activeStack||'none'")"
          if [ "$active" = "none" ]; then
            echo "activeStack=none → 스택 적용 단계 건너뜀 (공통 하네스만 검사)"
          else
            node .harness/bin/apply-stack.mjs
          fi

      - name: Install dependencies
        run: npm install

      - name: Run harness check
        env:
          POLICY_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          POLICY_HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: npm run harness:check:strict -- --base "$POLICY_BASE_REF" --head "$POLICY_HEAD_REF"
